<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpendScan - Tambah Transaksi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                extend: {
                    "colors": {
                        "surface-tint": "#4d44e3",
                        "on-primary-fixed-variant": "#3323cc",

                        "success": "#10B981",
                        "outline": "#777587",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffdbcc",
                        "tertiary-fixed-dim": "#ffb695",
                        "on-surface": "#191c1d",
                        "on-primary-container": "#dad7ff",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e7e8e9",
                        "surface-container": "#edeeef",
                        "primary-fixed": "#e2dfff",
                        "inverse-on-surface": "#f0f1f2",
                        "secondary-fixed": "#dce2f3",
                        "primary": "#3525cd",
                        "on-error": "#ffffff",
                        "tertiary": "#7e3000",
                        "on-secondary-container": "#5e6572",
                        "on-primary-fixed": "#0f0069",
                        "primary-container": "#4f46e5",
                        "on-tertiary-container": "#ffd2be",
                        "on-background": "#191c1d",
                        "secondary-fixed-dim": "#c0c7d6",
                        "surface": "#FFFFFF",
                        "danger": "#EF4444",
                        "outline-variant": "#c7c4d8",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#151c27",
                        "border": "#E5E7EB",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#351000",
                        "inverse-primary": "#c3c0ff",
                        "secondary-container": "#dce2f3",
                        "text-primary": "#111827",
                        "tertiary-container": "#a44100",
                        "surface-bright": "#f8f9fa",
                        "primary-fixed-dim": "#c3c0ff",
                        "surface-container-low": "#f3f4f5",
                        "on-secondary-fixed-variant": "#404754",

                        "surface-container-highest": "#e1e3e4",
                        "secondary": "#585f6c",

                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "2.75rem",
                        "stack-gap": "0.75rem",

                    "fontFamily": {

                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]

                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f8f9fa;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #E5E7EB;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-background selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar -->
<header class="bg-surface dark:bg-on-surface flex justify-between items-center px-container-margin h-14 w-full top-0 border-b border-border dark:border-outline-variant sticky z-50">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-200">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed">Tambah Transaksi</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant">calendar_month</span>
</div>
</header>
<main class="max-w-xl mx-auto p-4 mb-24">
<!-- Form Container -->
<div class="bg-surface border border-border rounded-xl p-6 shadow-sm">
<form class="flex flex-col gap-6" id="transaction-form">
<!-- Amount Field (Large Accent) -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-secondary-fixed-variant uppercase tracking-wider">Jumlah (IDR)</label>
<div class="relative flex items-center border-b-2 border-primary-container pb-2 focus-within:border-primary transition-all">
<span class="font-display-idr text-display-idr text-primary mr-2">Rp</span>
<input class="w-full bg-transparent border-none focus:ring-0 font-display-idr text-display-idr p-0 text-on-surface placeholder:text-surface-variant" name="amount" placeholder="0" required="" step="1000" type="number"/>
</div>
</div>
<!-- Title Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-secondary-fixed-variant">Judul Transaksi</label>
<input class="w-full rounded-lg border-border focus:border-primary focus:ring-1 focus:ring-primary py-3 px-4 text-body-lg font-body-lg" name="title" placeholder="Misal: Makan Siang" required="" type="text"/>
</div>
<!-- Category Picker (Chips) -->
<div class="flex flex-col gap-3">
<label class="font-label-sm text-label-sm text-on-secondary-fixed-variant">Kategori</label>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer group">
<input checked="" class="hidden peer" name="category" type="radio" value="food"/>
<div class="px-4 py-2 rounded-full border border-border peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white transition-all flex items-center gap-2 group-hover:bg-surface-container-low">
<span class="material-symbols-outlined text-[18px]">restaurant</span>
<span class="text-body-md font-body-md">Makan</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" name="category" type="radio" value="transport"/>
<div class="px-4 py-2 rounded-full border border-border peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white transition-all flex items-center gap-2 group-hover:bg-surface-container-low">
<span class="material-symbols-outlined text-[18px]">directions_car</span>
<span class="text-body-md font-body-md">Transport</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" name="category" type="radio" value="shopping"/>
<div class="px-4 py-2 rounded-full border border-border peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white transition-all flex items-center gap-2 group-hover:bg-surface-container-low">
<span class="material-symbols-outlined text-[18px]">shopping_bag</span>
<span class="text-body-md font-body-md">Belanja</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" name="category" type="radio" value="bills"/>
<div class="px-4 py-2 rounded-full border border-border peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white transition-all flex items-center gap-2 group-hover:bg-surface-container-low">
<span class="material-symbols-outlined text-[18px]">receipt</span>
<span class="text-body-md font-body-md">Tagihan</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" name="category" type="radio" value="other"/>
<div class="px-4 py-2 rounded-full border border-border peer-checked:bg-primary peer-checked:border-primary peer-checked:text-white transition-all flex items-center gap-2 group-hover:bg-surface-container-low">
<span class="material-symbols-outlined text-[18px]">category</span>
<span class="text-body-md font-body-md">Lainnya</span>
</div>
</label>
</div>
</div>
<!-- Date Picker -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-secondary-fixed-variant">Tanggal</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">calendar_today</span>
<input class="w-full rounded-lg border-border focus:border-primary focus:ring-1 focus:ring-primary py-3 pl-11 pr-4 text-body-lg font-body-lg appearance-none bg-surface" name="date" required="" type="date"/>
</div>
</div>
<!-- Note (Textarea) -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-secondary-fixed-variant">Catatan (Opsional)</label>
<textarea class="w-full rounded-lg border-border focus:border-primary focus:ring-1 focus:ring-primary py-3 px-4 text-body-md font-body-md" name="note" placeholder="Tambahkan deskripsi singkat..." rows="3"></textarea>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary text-white rounded-xl font-headline-md text-headline-md shadow-lg shadow-primary/20 hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span class="material-symbols-outlined">save</span>
                    Simpan Transaksi
                </button>
</form>
</div>
<!-- Secondary Option: Scan -->
<div class="mt-8 text-center">
<p class="text-on-secondary-container font-body-md mb-4">Atau punya struk fisik?</p>
<button class="inline-flex items-center gap-3 px-6 py-3 bg-secondary-container text-on-secondary-fixed rounded-full hover:bg-surface-container-highest transition-all duration-200 group">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform">document_scanner</span>
<span class="font-label-sm text-label-sm uppercase tracking-wide">Pindai Struk dengan OCR</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface dark:bg-on-surface border-t border-border dark:border-outline-variant flex justify-around items-center h-20 px-2 pb-safe">
<a class="flex flex-col items-center justify-center text-on-secondary-container dark:text-on-secondary-fixed-variant hover:bg-surface-container dark:hover:bg-surface-container-highest rounded-full transition-transform duration-150 p-2" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container dark:text-on-secondary-fixed-variant hover:bg-surface-container dark:hover:bg-surface-container-highest rounded-full transition-transform duration-150 p-2" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-label-sm text-label-sm mt-1">History</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-full px-4 py-1 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">document_scanner</span>
<span class="font-label-sm text-label-sm">Scan</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container dark:text-on-secondary-fixed-variant hover:bg-surface-container dark:hover:bg-surface-container-highest rounded-full transition-transform duration-150 p-2" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm mt-1">Profile</span>
</a>
</nav>
<script>
        // Set today as default date
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.querySelector('input[type="date"]').value = today;

            // Form interaction handling
            const form = document.getElementById('transaction-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const originalContent = btn.innerHTML;
                
                // Show loading state
                btn.disabled = true;
                btn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Menyimpan...
                `;

                // Simulate save delay
                setTimeout(() => {
                    // Success feedback
                    btn.classList.remove('bg-primary');
                    btn.classList.add('bg-success');
                    btn.innerHTML = `
                        <span class="material-symbols-outlined">check_circle</span>
                        Berhasil Disimpan
                    `;
                    
                    // Reset or Redirect simulation
                    setTimeout(() => {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                        // alert('Transaksi berhasil ditambahkan!');
                        // Reset button for demo purposes
                        setTimeout(() => {
                            btn.disabled = false;
                            btn.classList.add('bg-primary');
                            btn.classList.remove('bg-success');
                            btn.innerHTML = originalContent;
                            form.reset();
                            document.querySelector('input[type="date"]').value = today;
                        }, 2000);
                    }, 1000);
                }, 1500);
            });
        });
    </script>
</body></html>
